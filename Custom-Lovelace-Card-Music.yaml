###################################################################
#
#  Music Only - Lovelace Card
#  Last Updated: 09.03.2026
#
#  Only shows active Plex sessions where media_type == 'track'
#  Requires: auto-entities, button-card, bar-card, card-mod
#
###################################################################

type: custom:auto-entities
show_empty: false
filter:
  exclude:
    - options: {}
      state: unknown
    - options: {}
      state: unavailable
    - options: {}
      state: "off"
    - options: {}
      state: "on"
    - options: {}
      attributes:
        local: null
  include:
    - entity_id: "*plex_session_*"
      attributes:
        media_type: track
      options:
        entity: this.entity_id
        type: custom:button-card
        tap_action:
          action: none
        variables:
          entity: this.entity_id
        custom_fields:
          picture:
            card:
              type: picture
              image: |
                [[[
                  return states[variables.entity].attributes.image_url 
                    ? states[variables.entity].attributes.image_url 
                    : "data:image/png;base64,";
                ]]]
              card_mod:
                style: |
                  ha-card {
                    box-shadow: 0;
                    border-radius: 5px;
                    margin: -1px 3px -6px 3px;
                  }
                  ha-card img {
                    min-height: 110px;
                    min-width: 110px;
                    width: 110px;
                    height: 110px;
                    object-fit: cover;
                  }
          bar:
            card:
              type: custom:bar-card
              entities:
                - entity: this.entity_id
              attribute: progress_percent
              unit_of_measurement: "%"
              positions:
                icon: "off"
                indicator: "off"
                name: inside
                value: inside
              height: 20px
              color: |
                [[[
                  if (states[variables.entity].state == 'playing') {
                    return '#1DB954';
                  } else if (states[variables.entity].state == 'paused') {
                    return '#e49f29; animation: blink 1.5s linear infinite;'; 
                  } else if (states[variables.entity].state == 'buffering') {
                    return '#e33f29; animation: blink 0.8s linear infinite;';
                  } else {
                    return '#000000';
                  }
                ]]]
              name: |
                [[[
                  const ent = states[variables.entity];
                  if (!ent) return '';

                  const state = (ent.state || '').toLowerCase();
                  const idx = ent.attributes?.media_index;

                  let nice =
                    state === 'playing' ? 'Playing' :
                    state === 'paused' ? 'Paused' :
                    state === 'buffering' ? 'Buffering' :
                    state.charAt(0).toUpperCase() + state.slice(1);

                  if (idx) nice += ' track ' + idx;

                  if (state !== 'paused') return nice;

                  const raw = ent.attributes?.stream_paused_duration;
                  if (!raw) return nice;

                  const txt = String(raw).trim();

                  const h = parseInt((txt.match(/(\d+)\s*h/i) || [])[1] || 0, 10);
                  const m = parseInt((txt.match(/(\d+)\s*m/i) || [])[1] || 0, 10);
                  const s = parseInt((txt.match(/(\d+)\s*s/i) || [])[1] || 0, 10);

                  if (h === 0 && m === 0 && s === 0 && !txt.match(/\d/)) {
                    return `${nice} - ${txt}`;
                  }

                  let pretty = '';
                  if (h > 0) {
                    pretty = `${h}h ${m}m ${s}s`;
                  } else if (m > 0) {
                    pretty = `${m}m ${s}s`;
                  } else {
                    pretty = `${s}s`;
                  }

                  return `${nice} - ${pretty}`;
                ]]]
              card_mod:
                style: |-
                  @keyframes blink { 50% { opacity: 0; } }

                  ha-card {
                    position: relative;
                    --ha-card-background: rgba(0, 0, 0, 0.8) !important;
                    border: 0.03px solid rgba(70, 130, 180, 0.3);
                    box-shadow: none;
                  }

                  ha-card #states { padding: 0; }

                  bar-card-currentbar, bar-card-backgroundbar {
                    border-radius: 8px !important;
                    left: 0;
                  }

                  bar-card-name {
                    margin-left: 3%;
                    text-shadow: 1px 1px 1px #0003;
                  }

                  bar-card-value {
                    position: absolute !important;
                    left: 50% !important;
                    transform: translateX(-50%) !important;
                    margin: 0 !important;
                    text-shadow: 1px 1px 1px #0003;
                    pointer-events: none;
                  }
          user: |
            [[[
              return "<b>" + states[variables.entity].attributes.user + "</b>"
            ]]]
          title: |
            [[[
              var a = states[variables.entity].attributes;
              var s = states[variables.entity].state;
              var icon = '';
              if (s == 'playing') {
                icon = "<ha-icon icon='mdi:play' style='width: 15px; height: 15px; position: relative; top: -2px;'></ha-icon> ";
              } else if (s == 'paused') {
                icon = "<ha-icon icon='mdi:pause' style='width: 15px; height: 15px; position: relative; top: -2px;'></ha-icon> ";
              }
              var artist = a.grandparent_title || '';
              var album = a.parent_title || '';
              if (album && album != artist) {
                return icon + artist + ' — ' + album;
              }
              return icon + artist;
            ]]]
          stream: |
            [[[
              var a = states[variables.entity].attributes;
              var codec = (a.stream_audio_codec || a.audio_codec || '').toUpperCase();
              var layout = a.stream_audio_channel_layout || a.audio_channel_layout || '';
              var bitrate = a.stream_audio_bitrate || a.audio_bitrate || '';
              var detail = codec;
              if (layout) detail += ' ' + layout;
              if (bitrate) detail += ' ' + bitrate + 'kbps';
              return detail;
            ]]]
          product: |
            [[[
              var player = states[variables.entity].attributes.player;
              var product = states[variables.entity].attributes.product;
              return product + ' - ' + '<i>' + player + '</i>';
            ]]]
          media_detail: |
            [[[
              var a = states[variables.entity].attributes;
              var track = a.title || a.full_title || '';
              return "<ha-icon icon='mdi:music' style='width: 15px; height: 15px; position: relative; top: -2px;'></ha-icon> " + track;
            ]]]
          stream_remaining: |
            [[[
              const ent = states[variables.entity];
              if (!ent) return '';

              const t = ent.attributes?.stream_remaining;
              if (!t) return '';

              const txt = String(t).trim();

              const parts = txt.split(':').map(p => parseInt(p, 10));
              if (parts.some(n => Number.isNaN(n))) return `<b>Remaining - ${txt}</b>`;

              let h = 0, m = 0, s = 0;
              if (parts.length === 3) [h, m, s] = parts;
              else if (parts.length === 2) {
                if (parts[0] >= 60) [m, s] = parts;
                else [h, m] = parts;
              } else {
                return `<b>Remaining - ${txt}</b>`;
              }

              let totalMinutes = (h * 60) + m + (s > 0 ? 1 : 0);
              if (totalMinutes <= 0) return '';

              const hours = Math.floor(totalMinutes / 60);
              const mins  = totalMinutes % 60;

              let pretty = '';
              if (hours > 0 && mins > 0) pretty = `${hours}h&nbsp;${mins}m`;
              else if (hours > 0)        pretty = `${hours}h`;
              else                       pretty = `${mins}m`;

              return `<b>Remaining - ${pretty}</b>`;
            ]]]
          bandwidth: |
            [[[ 
              var bytes = states[variables.entity].attributes.bandwidth * 1000;
              var sizes = ['Bytes', 'Kbps', 'Mbps', 'Gbps', 'Tbps'];
              if (bytes == 0) return 'n/a';
              var i = parseInt(Math.floor(Math.log(bytes) / Math.log(1000)));
              if (i == 0) return 'Bandwidth: ' + bytes + ' ' + sizes[i];
              return 'Bandwidth: ' + (bytes / Math.pow(1000, i)).toFixed(1) + ' ' + sizes[i];
            ]]]
        card_mod:
          style: |
            ha-card {
              padding: 0;
              margin: 5px 0 0 0;
              border: 0.01px solid rgba(70, 130, 180, 0.5);
              box-shadow: 3px 3px 5px rgba(0, 0, 0, 0.5);
              background: rgba(20, 20, 35, 0.5) !important;
            }
            ha-card #container {
            margin: 5px 0 0 0;
            }
            #name {
              display:none;
            }
        styles:
          card:
            - height: 100%
            - padding: 0
          custom_fields:
            bar:
              - text-transform: capitalize
              - font-size: 13px
              - padding-top: 2px
              - padding-bottom: 0px
              - position: relative
              - width: 252%
              - overflow: hidden
            user:
              - text-transform: capitalize
              - text-align: end
              - font-size: 12px
              - font-family: Arial, sans-serif;
              - font-style: italic;
              - letter-spacing: 2px;
              - margin-top: "-4px"
            title:
              - text-transform: capitalize
              - text-align: start
              - font-size: 18px
              - margin-top: "-4px"
              - margin-bottom: 4px
            stream:
              - text-transform: capitalize
              - text-align: start
              - font-size: 12px
              - margin-bottom: "-4px"
            product:
              - text-transform: capitalize
              - text-align: start
              - font-size: 12px
              - margin-top: "-4px"
            media_detail:
              - text-transform: uppercase
              - text-align: start
              - font-size: 15px
            stream_remaining:
              - font-weight: 200
              - letter-spacing: 0.4px
              - text-transform: none
              - text-align: end
              - font-size: 11px
              - opacity: 0.4
              - margin-right: 10px
              - align-self: center
              - position: relative
              - z-index: 5
            bandwidth:
              - text-transform: capitalize
              - text-align: end
              - font-size: 12px
              - margin-bottom: "-4px"
          grid:
            - grid-template-areas: |
                "picture product user"
                "picture title title"
                "picture media_detail media_detail"
                "picture bar stream_remaining"
                "picture stream bandwidth"
            - grid-template-columns: 120px 2fr 3fr
            - grid-gap: 5px 3px
card:
  type: grid
  columns: 1
  square: false
card_param: cards
